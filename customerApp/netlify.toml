[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_APP_NAME,VITE_APP_TAGLINE,VITE_SKIP_NOTE,VITE_LUNCH_CUTOFF_TIME,VITE_DINNER_CUTOFF_TIME,VITE_BUSINESS_RULES,VITE_MAX_CONCURRENT_REQUESTS"
  SECRETS_SCAN_OMIT_PATHS = "**/*.md,.env.example"

[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
